<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String</title>
</head>
<body>
    <h1>String,class and inheritance</h1>
    <script>
        //1
        let str="Hello World!";
        console.log(str.length);


        //2
        console.log(str.replace("World!","Javascript"));

        //3
        console.log(str.slice(0,5));
        console.log(str.substring(0,5));

        //4
        console.log(str.toLowerCase());
        console.log(str.toUpperCase());


       // 5
        let name="string is called";
        console.log(name.split(" "));


       // 6
        console.log(str.startsWith("Hello"));
        console.log(str.endsWith("Script"));

        //7
        console.log("    Welcome".trim());


       // Class & Inheritance//
        //8,12
        class Bank{
            balance=10;

            constructor(name,age,college){
                console.log(`constructor is called->${name},${age},${college}`);
                
            }

            display(){
                console.log("Bank class");
                
            }
        }
            let bank=new Bank("priya",21,"kasc");
            bank.display();

       // 9,10,11//
        class Account extends Bank{
            constructor(){
                super();
                super.display();
            }
            display(){
                console.log("Account class");
                
            }
        }
        let account=new Account();
        console.log(account.balance);
        account.display();  
    </script>
</body>
</html>
